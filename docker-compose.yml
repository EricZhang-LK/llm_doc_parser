# docker-compose.yml
version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  rag-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - EMBEDDER_PROVIDER=${EMBEDDER_PROVIDER:-openai}
      - GLM_MODEL=${GLM_MODEL:-glm-4-flash}
      - ZHIPU_EMBEDDING_MODEL=${ZHIPU_EMBEDDING_MODEL:-embedding-3}
      - ZHIPU_EMBEDDING_DIMENSIONS=${ZHIPU_EMBEDDING_DIMENSIONS:-1024}
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - qdrant

volumes:
  qdrant_data: